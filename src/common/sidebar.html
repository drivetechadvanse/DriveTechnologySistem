<!-- Menú Lateral -->
    <div id="sidebar" class="absolute inset-y-0 left-0 w-64 bg-white z-[110] shadow-2xl flex flex-col">
        <div id="user-profile-header" class="hidden p-6 bg-gray-900 text-white flex flex-col items-center text-center">
            <div class="relative mb-3">
                <img id="side-user-photo" src="" class="w-20 h-20 rounded-full object-cover border-4 border-red-600 shadow-xl bg-gray-800">
                <div class="absolute -bottom-1 -right-1 bg-green-500 w-5 h-5 rounded-full border-4 border-gray-900"></div>
            </div>
            <h3 id="side-user-name" class="text-sm font-black uppercase italic tracking-tighter">Cargando...</h3>
            <div class="flex items-center gap-4 mt-3">
                <div class="flex flex-col">
                    <span class="text-[8px] text-gray-400 font-bold uppercase">Calificación</span>
                    <span class="text-[10px] font-black text-yellow-500 italic">★ 5.0</span>
                </div>
                <div class="w-[1px] h-4 bg-gray-700"></div>
                <div class="flex flex-col">
                    <span class="text-[8px] text-gray-400 font-bold uppercase">Viajes</span>
                    <span id="side-user-trips" class="text-[10px] font-black text-white italic">0</span>
                </div>
            </div>
        </div>

        <div id="side-header-admin" class="hidden p-6 bg-gray-900 text-white">
            <div class="w-10 h-10 bg-red-600 rounded-xl flex items-center justify-center mb-3"><i data-lucide="cpu" class="w-6 h-6"></i></div>
            <h2 class="text-lg font-black italic uppercase">DRIVE <span class="text-red-600 text-lg">MX</span></h2>
            <p class="text-[8px] text-gray-400 font-bold uppercase tracking-widest italic">Admin System</p>
        </div>

        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <div id="nav-admin" class="hidden">
                <button type="button" onclick="toggleAccordion('admin-acc')" class="w-full flex items-center justify-between p-3 text-gray-700 font-black hover:bg-gray-50 rounded-xl uppercase text-[10px] italic">
                    <div class="flex items-center gap-3"><i data-lucide="users" class="text-red-600 w-4 h-4"></i><span>Gestión de Usuarios</span></div>
                    <i data-lucide="chevron-down" class="w-3 h-3"></i>
                </button>
                <div id="admin-acc" class="accordion-content bg-gray-50/50 rounded-xl">
                    <button type="button" onclick="renderAdminRequests()" class="w-full text-left p-3 pl-10 text-[9px] font-bold text-gray-500 uppercase border-b border-white">Conductores</button>
                    <button type="button" onclick="renderAdminPassengers()" class="w-full text-left p-3 pl-10 text-[9px] font-bold text-gray-500 uppercase border-b border-white">Pasajeros</button>
                </div>
                <button type="button" onclick="toggleAccordion('services-acc')" class="w-full flex items-center justify-between p-3 text-gray-700 font-black hover:bg-gray-50 rounded-xl uppercase text-[10px] italic mt-1">
                    <div class="flex items-center gap-3"><i data-lucide="briefcase" class="text-red-600 w-4 h-4"></i><span>Servicios</span></div>
                    <i data-lucide="chevron-down" class="w-3 h-3"></i>
                </button>
                <div id="services-acc" class="accordion-content bg-gray-50/50 rounded-xl">
                    <button type="button" onclick="openUrbanTripsView()" class="w-full text-left p-3 pl-10 text-[9px] font-bold text-gray-500 uppercase border-b border-white">Viajes Urbanos</button>
                </div>
                <button type="button" onclick="openAdminWallet()" class="w-full flex items-center gap-3 p-3 text-gray-700 font-black hover:bg-gray-50 rounded-xl uppercase text-[10px] italic mt-1">
                    <i data-lucide="wallet" class="text-red-600 w-4 h-4"></i><span>Cartera Admin</span>
                </button>
            </div>
            <div id="nav-passenger" class="hidden">
                <button type="button" onclick="applyToBeDriver()" class="w-full flex items-center gap-3 p-3 text-red-600 font-black hover:bg-red-50 rounded-xl uppercase text-[10px] italic">
                    <i data-lucide="car" class="w-4 h-4"></i><span>Quiero ser Conductor</span>
                </button>
                <button type="button" class="w-full flex items-center gap-3 p-3 text-gray-700 font-black hover:bg-gray-50 rounded-xl uppercase text-[10px] italic">
                    <i data-lucide="history" class="w-4 h-4"></i><span>Mis Viajes</span>
                </button>
            </div>
        </nav>
        <div class="p-4 border-t mb-4">
            <button type="button" onclick="location.reload()" class="w-full py-3 bg-red-50 text-red-600 rounded-xl font-black text-[9px] uppercase italic">Cerrar Sesión</button>
        </div>
    </div>
